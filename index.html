<!DOCTYPE html>
<html>
<head>
    <title>ULTRA SIMPLE TEST</title>
</head>
<body>
    <h1>Test Page</h1>
    <div id="status">Loading...</div>
    
    <script>
        document.getElementById('status').innerHTML = '1. Script tag starting...';
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@web3auth/modal@7.0.1/dist/modal.umd.min.js"></script>

    <script>
        document.getElementById('status').innerHTML = '2. Script tag executed';
        
        setTimeout(() => {
            try {
                document.getElementById('status').innerHTML = '3. Checking window object...';
                
                const keys = Object.keys(window);
                document.getElementById('status').innerHTML = '4. Window keys: ' + keys.length;
                
                // Find any Web3 related globals
                const web3Keys = keys.filter(k => 
                    k.toLowerCase().includes('web3') || 
                    k.toLowerCase().includes('auth')
                );
                
                if (web3Keys.length > 0) {
                    document.getElementById('status').innerHTML = '5. Found: ' + web3Keys.join(', ');
                } else {
                    document.getElementById('status').innerHTML = '5. NO Web3Auth found in window';
                }
                
                console.log('All window keys:', keys);
                
            } catch (e) {
                document.getElementById('status').innerHTML = 'ERROR: ' + e.message;
            }
        }, 2000);
    </script>
</body>
</html>
