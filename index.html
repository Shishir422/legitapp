<!DOCTYPE html>
<html>
<head>
    <title>Legitimate App</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
        #result { margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 4px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>🏢 Legitimate App (Victim)</h1>
    <button id="login">Login with Google</button>
    <div id="result"></div>

    <!-- Load Web3Auth from correct UMD path -->
    <script src="https://cdn.jsdelivr.net/npm/@web3auth/modal@7.0.1/dist/modal.umd.min.js"></script>
    
    <script>
        const clientId = "BNHntDyvOGBtNZgkK77j_qVGCrDGPdOvOeJSbfsnsir4Y90kpTcrVTAtcdnwGKt-0wCJB3BZ89xOm8WUO-1u38Y";
        
        async function init() {
            try {
                // Check what's available in window
                console.log('Web3Auth available as:', window.Web3Auth);
                console.log('Available globals:', Object.keys(window).filter(k => k.includes('Web3')));
                
                // The UMD export might be under a different name
                // Try multiple possible names
                const Web3AuthConstructor = window.Web3Auth || window.Web3auth || window.web3auth;
                
                if (!Web3AuthConstructor) {
                    throw new Error('Web3Auth not found in window. Available globals: ' + 
                        Object.keys(window).filter(k => k.includes('Web3')).join(', '));
                }

                const web3auth = new Web3AuthConstructor({
                    clientId: clientId,
                    web3AuthNetwork: "sapphire_devnet",
                });

                await web3auth.initModal();
                
                document.getElementById('result').innerHTML = '<span class="success">✅ Ready to login</span>';
                
                document.getElementById('login').onclick = async () => {
                    try {
                        document.getElementById('result').innerHTML = '⏳ Logging in...';
                        const provider = await web3auth.connect();
                        document.getElementById('result').innerHTML = '<span class="success">✅ Logged in! Check console</span>';
                        console.log('Provider:', provider);
                        
                        const user = await web3auth.getUserInfo();
                        console.log('User:', user);
                        console.log('Current URL:', window.location.href);
                        
                    } catch (error) {
                        document.getElementById('result').innerHTML = '<span class="error">❌ Login failed: ' + error.message + '</span>';
                        console.error('Login error:', error);
                    }
                };
                
            } catch (error) {
                document.getElementById('result').innerHTML = '<span class="error">❌ Init failed: ' + error.message + '</span>';
                console.error('Init error:', error);
            }
        }

        // Start when page loads
        init();
    </script>
</body>
</html>
