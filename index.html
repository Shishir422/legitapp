<!DOCTYPE html>
<html>
<head>
    <title>Legitimate App</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
        #result { margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 4px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>🏢 Legitimate App (Victim)</h1>
    <button id="login">Login with Google</button>
    <div id="result">Loading...</div>

    <script type="module">
        // Use Skypack CDN - more reliable for Web3Auth
        import { Web3Auth } from 'https://cdn.skypack.dev/@web3auth/modal@7.0.1';
        
        const clientId = "BNHntDyvOGBtNZgkK77j_qVGCrDGPdOvOeJSbfsnsir4Y90kpTcrVTAtcdnwGKt-0wCJB3BZ89xOm8WUO-1u38Y";
        
        async function init() {
            try {
                document.getElementById('result').innerHTML = 'Initializing...';
                
                const web3auth = new Web3Auth({
                    clientId: clientId,
                    web3AuthNetwork: "sapphire_devnet",
                });

                await web3auth.initModal();
                
                document.getElementById('result').innerHTML = '✅ Ready to login';
                
                document.getElementById('login').onclick = async () => {
                    try {
                        document.getElementById('result').innerHTML = '⏳ Opening login...';
                        const provider = await web3auth.connect();
                        document.getElementById('result').innerHTML = '✅ Logged in! Check console';
                        console.log('Provider:', provider);
                        
                        const user = await web3auth.getUserInfo();
                        console.log('User:', user);
                        
                    } catch (error) {
                        document.getElementById('result').innerHTML = '❌ Login failed: ' + error.message;
                        console.error('Login error:', error);
                    }
                };
                
            } catch (error) {
                document.getElementById('result').innerHTML = '❌ Error: ' + error.message;
                console.error('Init error:', error);
            }
        }

        // Start when page loads
        init();
    </script>
</body>
</html>
