<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <button id="login">Login</button>
    <div id="status"></div>

    <!-- Load from most reliable CDN -->
    <script src="https://unpkg.com/@web3auth/modal@7.0.1/dist/modal.umd.min.js"></script>

    <script>
        document.getElementById('status').innerHTML = '✅ Script loaded';
        
        document.getElementById('login').onclick = async () => {
            try {
                document.getElementById('status').innerHTML = '⏳ Initializing...';
                
                // Try different possible names
                const Web3AuthClass = window.Web3Auth || window.web3auth || window.Modal;
                
                if (!Web3AuthClass) {
                    throw new Error('Web3Auth not found. Available: ' + Object.keys(window).join(', '));
                }
                
                const web3auth = new Web3AuthClass({
                    clientId: "BNHntDyvOGBtNZgkK77j_qVGCrDGPdOvOeJSbfsnsir4Y90kpTcrVTAtcdnwGKt-0wCJB3BZ89xOm8WUO-1u38Y",
                    web3AuthNetwork: "sapphire_devnet",
                });
                
                document.getElementById('status').innerHTML = '✅ Initialized, opening modal...';
                
                await web3auth.initModal();
                await web3auth.connect();
                
                document.getElementById('status').innerHTML = '✅ Connected!';
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Error: ' + error.message;
                console.error(error);
            }
        };
    </script>
</body>
</html>
