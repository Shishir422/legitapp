<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <h1>Test Page</h1>
    <button id="login">Login</button>
    <div id="status"></div>

    <script type="module">
        import { Web3Auth } from 'https://esm.sh/@web3auth/modal@7.0.1';
        
        document.getElementById('status').innerHTML = 'Module loaded';
        
        const clientId = "BNHntDyvOGBtNZgkK77j_qVGCrDGPdOvOeJSbfsnsir4Y90kpTcrVTAtcdnwGKt-0wCJB3BZ89xOm8WUO-1u38Y";
        
        const web3auth = new Web3Auth({
            clientId: clientId,
            web3AuthNetwork: "sapphire_devnet",
        });
        
        document.getElementById('status').innerHTML = 'Initializing...';
        
        web3auth.initModal().then(() => {
            document.getElementById('status').innerHTML = 'Ready';
            
            document.getElementById('login').onclick = () => {
                web3auth.connect();
            };
        }).catch(err => {
            document.getElementById('status').innerHTML = 'Error: ' + err.message;
        });
    </script>
</body>
</html>
